<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Para Mi Amor 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <meta property="og:title" content="Un mensaje especial para ti... 💌" />
    <meta property="og:description" content="Abre este enlace para ver lo que preparé para ti con mucho amor." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600&auto=format&fit=crop" />
    <meta property="og:type" content="website" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            font-family: 'Poppins', sans-serif;
            perspective: 1000px;
        }

        audio {
            display: none;
        }

        /* Contenedor principal de la carta y sobre */
        .envelope-container {
            position: relative;
            width: 320px;
            height: 220px;
            transition: transform 1s ease-in-out;
            margin-top: 50px;
        }

        /* Baja el sobre cuando se abre para dar espacio a la carta */
        .envelope-container.open {
            transform: translateY(120px);
        }

        /* El Sobre (Cuerpo) */
        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #c58b72;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 3;
            cursor: pointer;
        }

        /* Solapa superior del sobre */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #d69a80;
            transform-origin: top;
            transition: transform 0.6s ease-in-out, z-index 0.2s ease-in-out 0.3s;
            z-index: 5;
        }

        /* Animación de la solapa al abrir */
        .envelope-container.open .flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* La Carta Secreta */
        .letter {
            position: absolute;
            width: 90%;
            height: 95%;
            background: #f8f1e7;
            left: 5%;
            top: 5%;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            overflow-y: auto;
            transition: transform 1s ease-in-out 0.3s, height 1s ease-in-out 0.3s, opacity 0.5s ease-in-out;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 2;
            opacity: 0;
        }

        /* Desplazamiento de la carta hacia arriba */
        .envelope-container.open .letter {
            transform: translateY(-250px);
            height: 400px;
            z-index: 4;
            opacity: 1;
            pointer-events: auto;
        }

        .photo-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo {
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Corazones Volantes */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: float 6s linear infinite;
            opacity: 0.7;
            bottom: -50px;
            z-index: 1;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }
            15% {
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) scale(1.2);
                opacity: 0;
            }
        }

        /* Texto de indicación */
        .click-text {
            position: absolute;
            bottom: -40px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 13px;
            letter-spacing: 2px;
            transition: opacity 0.4s;
            z-index: 6;
            pointer-events: none;
        }

        .envelope-container.open .click-text {
            opacity: 0;
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="falling-in-love.mp3" type="audio/mpeg">
    </audio>

    <div class="heart" style="left:10%; animation-delay:0s;">❤</div>
    <div class="heart" style="left:25%; animation-delay:2s;">❤</div>
    <div class="heart" style="left:50%; animation-delay:4s;">❤</div>
    <div class="heart" style="left:75%; animation-delay:1s;">❤</div>
    <div class="heart" style="left:90%; animation-delay:3s;">❤</div>

    <div class="envelope-container" id="envelope-container" onclick="toggleLetter()">
        <div class="flap"></div>
        <div class="envelope">
            <div class="letter" onclick="event.stopPropagation();">
                <div class="photo-container">
                    <img src="amor.png" class="photo" alt="Nuestro Recuerdo">
                </div>
            </div>
        </div>
        <div class="click-text">Abre la carta 💌</div>
    </div>

    <script>
        function toggleLetter() {
            const container = document.getElementById("envelope-container");
            const music = document.getElementById("bg-music");

            container.classList.toggle("open");

            if (container.classList.contains("open")) {
                music.play().catch(error => {
                    console.log("Audio bloqueado o archivo no válido:", error);
                });
            } else {
                music.pause();
                music.currentTime = 0;
            }
        }
    </script>
</body>
</html>
